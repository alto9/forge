name: Release — Slack notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack payload
        run: |
          jq -n --slurpfile ev "$GITHUB_EVENT_PATH" '
            ($ev[0].release) as $r |
            (($r.body // "") | if length > 2800 then .[0:2800] + "\n\n_…truncated_" else . end) as $bodySafe |
            {
              channel: "#alto9-tech-team",
              text: ("Forge " + $r.tag_name + " released"),
              blocks: [
                {
                  type: "header",
                  text: {type: "plain_text", text: ("Forge " + $r.tag_name), emoji: true}
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: (if ($bodySafe | length) > 0 then $bodySafe else "_No release notes provided._" end)
                  }
                },
                {
                  type: "context",
                  elements: [
                    {type: "mrkdwn", text: ("<" + $r.html_url + "|View release on GitHub>")}
                  ]
                }
              ]
            }
          ' > slack-payload.json

      - name: Post to Slack
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload-file-path: slack-payload.json
