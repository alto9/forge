name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  release:
    name: Release
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build extension
        run: npm run build
      
      - name: Package extension (pre-release)
        run: npm run package
      
      - name: Semantic Release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
      
      - name: Re-package extension (post-release)
        if: success() && hashFiles('.semantic-release-success') != ''
        run: npm run package
      
      - name: Publish VSCode extension to marketplace
        if: success() && hashFiles('.semantic-release-success') != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VSIX_FILE=$(ls -t forge-*.vsix | head -1)
          npx --yes @vscode/vsce publish --packagePath "$VSIX_FILE" --pat $VSCE_PAT
      
      - name: Publish to Open VSX marketplace
        if: success() && hashFiles('.semantic-release-success') != ''
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          VSIX_FILE=$(ls -t forge-*.vsix | head -1)
          npx --yes ovsx publish --packagePath "$VSIX_FILE" --pat $OVSX_PAT

      - name: Fetch latest GitHub release for Slack
        if: always() && hashFiles('.semantic-release-success') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/releases/latest" \
            --jq '{tag_name: .tag_name, body: (.body // ""), html_url: .html_url}' > release-meta.json

      - name: Build Slack payload
        if: always() && hashFiles('.semantic-release-success') != ''
        run: |
          jq -n --slurpfile meta release-meta.json '
            ($meta[0]) as $m |
            (($m.body) | if length > 2800 then .[0:2800] + "\n\n_…truncated_" else . end) as $bodySafe |
            {
              channel: "#alto9-tech-team",
              text: ("Forge " + $m.tag_name + " released"),
              blocks: [
                {
                  type: "header",
                  text: {type: "plain_text", text: ("Forge " + $m.tag_name), emoji: true}
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: (if ($bodySafe | length) > 0 then $bodySafe else "_No release notes provided._" end)
                  }
                },
                {
                  type: "context",
                  elements: [
                    {type: "mrkdwn", text: ("<" + $m.html_url + "|View release on GitHub>")}
                  ]
                }
              ]
            }
          ' > slack-payload.json

      - name: Post release to Slack
        if: always() && hashFiles('.semantic-release-success') != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload-file-path: slack-payload.json
